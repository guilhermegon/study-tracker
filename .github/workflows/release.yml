name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Nova versão (ex: 1.1.0)'
        required: true
        type: string
      release_notes:
        description: 'Notas da release (opcional)'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Atualizar versão no package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ github.event.inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit da nova versão
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ github.event.inputs.version }}"
          git push

      - name: Criar tag e release no GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

          if [ -n "${{ github.event.inputs.release_notes }}" ]; then
            gh release create "v${{ github.event.inputs.version }}" \
              --title "v${{ github.event.inputs.version }}" \
              --notes "${{ github.event.inputs.release_notes }}"
          else
            gh release create "v${{ github.event.inputs.version }}" \
              --title "v${{ github.event.inputs.version }}" \
              --generate-notes
          fi
